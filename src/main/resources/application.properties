# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080
server.address=0.0.0.0

# ========================
# PERFORMANCE - FAST STARTUP
# ========================
spring.main.lazy-initialization=true
spring.jpa.open-in-view=false

# ========================
# DATABASE (SQLite)
# ========================
spring.datasource.url=jdbc:sqlite:vellbeing.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========================
# JWT CONFIGURATION
# ========================
# IMPORTANT: Set JWT_SECRET environment variable in production!
jwt.secret=${JWT_SECRET:vellbeing-dev-secret-key-change-in-production-256-bits}
jwt.expiration=86400000
jwt.remember-me-expiration=2592000000

# ========================
# EMAIL CONFIGURATION (SMTP)
# ========================
# Gmail example (enable "Less secure apps" or use App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App email settings
app.mail.from=${MAIL_FROM:noreply@vellbeing.app}
app.mail.frontend-url=${FRONTEND_URL:http://localhost:5000}

# ========================
# CORS CONFIGURATION
# ========================
# Alpha testing: Allow all origins (restrict in production)
# Add specific domains as needed (avoid wildcards in production)
app.cors.allowed-origins=${CORS_ORIGINS:*}

# ========================
# EXTERNAL API CONFIGURATION
# ========================
# USDA FoodData Central API (for nutrition data)
# Get your API key at: https://fdc.nal.usda.gov/api-key-signup.html
usda.api.key=${USDA_API_KEY:QfuKBsuXaGD44GpIXwcpPYqTh5INJYaedghJUyLL}
usda.api.base-url=https://api.nal.usda.gov/fdc/v1

# wger Workout Manager API (no API key required)
wger.api.base-url=https://wger.de/api/v2

# Open Library API (no API key required)
openlibrary.api.base-url=https://openlibrary.org

# Alpha Vantage API (for stock and crypto market data)
# API key: https://www.alphavantage.co/support/#api-key
alphavantage.api.key=${ALPHA_VANTAGE_API_KEY:Q7GBMFNeTMiAlxNpVOXAIutgxSiuKGX9}

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.com.health=DEBUG
logging.level.org.springframework.security=DEBUG
